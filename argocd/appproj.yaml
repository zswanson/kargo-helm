apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: kargo-helm
  namespace: argocd
spec:
  clusterResourceWhitelist:
  - group: ""
    kind: Namespace
  destinations:
  - name: '*'
    namespace: app-a-*
    server: '*'
  - name: '*'
    namespace: app-b-*
    server: '*'
  namespaceResourceWhitelist:
  - group: '*'
    kind: '*'
  sourceRepos:
  - https://github.com/zswanson/kargo-helm.git
