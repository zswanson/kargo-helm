apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kargo-helm-app-a
  namespace: argocd
spec:
  generators:
  - git:
      repoURL: https://github.com/zswanson/kargo-helm.git
      revision: HEAD
      directories:
      - path: env-a/*
  template:
    metadata:
      name: kargo-helm-{{path.basename}}
      annotations:
        kargo.akuity.io/authorized-stage: kargo-helm:{{path.basename}}
    spec:
      destination:
        namespace: kargo-helm-{{path.basename}}
        name: demo
      project: kargo-helm
      source:
        path: charts/guestbook
        repoURL: https://github.com/zswanson/kargo-helm.git
        helm:
          valueFiles:
          - "/env-a/{{path.basename}}/values.yaml"
          - "/env-a/{{path.basename}}/feature-flags.yaml"

