apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kargo-helm-app-a
  namespace: argocd
spec:
  generators:
  - list:
      elements:
      - stage: app-a-dev
      - stage: app-a-staging
      - stage: app-a-prod-us
      - stage: app-a-prod-eu
  template:
    metadata:
      name: kargo-helm-{{stage}}
      annotations:
        kargo.akuity.io/authorized-stage: kargo-helm:{{stage}}
    spec:
      destination:
        namespace: kargo-helm-{{stage}}
        name: demo
      project: kargo-helm
      source:
        path: charts/guestbook
        repoURL: https://github.com/zswanson/kargo-helm.git
        targetRevision: stage/{{stage}}
        helm:
          valueFiles:
          - /values.yaml
          - /feature-flags.yaml

