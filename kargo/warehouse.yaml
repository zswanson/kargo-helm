apiVersion: kargo.akuity.io/v1alpha1
kind: Warehouse
metadata:
  name: app-a
  namespace: kargo-helm
spec:
  subscriptions:
  - git:
      branch: main
      commitSelectionStrategy: NewestFromBranch
      discoveryLimit: 20
      repoURL: https://github.com/zswanson/kargo-helm.git
      includePaths:
      - base-a/feature-flags.yaml

