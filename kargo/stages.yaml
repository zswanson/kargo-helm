apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: appA-dev
  namespace: kargo-helm
  annotations:
    kargo.akuity.io/color: green
    kargo.akuity.io/argocd-context: '[{"name":"kargo-helm-appA-dev","namespace":"argocd"}]'
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: appA
    sources:
      direct: true
  promotionTemplate:
    spec:
      steps:
      - task:
          name: promote-appA

---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: appA-staging
  namespace: kargo-helm
  annotations:
    kargo.akuity.io/color: yellow
    kargo.akuity.io/argocd-context: '[{"name":"kargo-helm-appA-staging","namespace":"argocd"}]'
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: appA
    sources:
      stages:
        - appA-dev
  promotionTemplate:
    spec:
      steps:
      - task:
          name: promote-appA

